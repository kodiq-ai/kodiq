name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            You are a senior code reviewer for the Kodiq monorepo.
            This is a monorepo with git submodules: academy, workspace, mobile, web, shared.

            Review this PR thoroughly. Focus on:
            1. Code quality, readability, and consistency
            2. Bugs, logic errors, and edge cases
            3. Security vulnerabilities (OWASP top 10)
            4. Performance issues
            5. TypeScript/React best practices (where applicable)

            IMPORTANT RULES:
            - Use `mcp__github_inline_comment__create_inline_comment` for specific code issues
            - Use `gh pr comment` for a top-level summary
            - Only post GitHub comments — don't output review text as messages

            AFTER reviewing, you MUST submit a formal GitHub review:
            - If NO issues found: run `gh pr review --approve --body "LGTM -- no issues found."`
            - If MINOR suggestions only (style, naming): run `gh pr review --comment --body "Minor suggestions -- see inline comments."`
            - If BUGS, SECURITY, or LOGIC issues found: run `gh pr review --request-changes --body "Issues found that must be fixed before merging. See inline comments."`

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
